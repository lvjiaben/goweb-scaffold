name: release-check

on:
  push:
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release governance files
        run: |
          test -f VERSION
          test -f CHANGELOG.md
          test -f docs/versioning.md
          test -f docs/compatibility.md
          test -f docs/releases/RELEASE_POLICY.md
          test -f docs/releases/RELEASE_CHECKLIST.md
          VERSION_VALUE="$(cat VERSION)"
          test -f "docs/releases/${VERSION_VALUE}.md"
          test -f "docs/upgrade/UPGRADE_${VERSION_VALUE}.md"
